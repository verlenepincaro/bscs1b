<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <title>Quizzes - Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background-color: #442858;
            color: #fff;
        }

        header {
            padding: 1.7rem 1rem;
            display: flex;
            justify-content: space-between;
            max-width: 80%;
            margin: auto;
            align-items: center;
            background-color: transparent;
        }

        .logo a {
            color: #fff;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: 800;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: .97rem;
            font-weight: 600;
            padding: 0.4rem 1rem;
        }

        nav a.active,
        nav a:hover {
            color: #f4bebe;
            transition: all .3s ease-in-out;
        }

        section {
            margin: 2rem 8.5rem;
        }

        .main {
            display: flex;
            flex-direction: column;
            margin: 5rem auto;
        }

        .main h1 {
            font-size: 2.5rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 2rem;
        }

        .main h1 span {
            color: #f4bebe;
        }

        .quiz-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .quiz-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(244, 190, 190, 0.2);
            padding: 2rem;
            border-radius: 15px;
            transition: 0.3s;
            text-align: center;
        }

        .quiz-card:hover {
            border-color: #f4bebe;
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
        }

        .quiz-card i {
            font-size: 2.5rem;
            color: #f4bebe;
            margin-bottom: 1rem;
        }

        .quiz-card h3 {
            margin-bottom: 1rem;
        }

        .score-tag {
            display: inline-block;
            background: #f4bebe;
            color: #442858;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        #click { display: none; }
        .menu { display: none; }

        @media only screen and (max-width:480px) {
            .menu { display: block; font-size: 1.5rem; color: #f4bebe; }
            header { max-width: 100%; }
            nav {
                position: absolute; display: grid; top: 75px; text-align: center;
                background-color: #442858; left: -100%; z-index: 1; width: 100%; padding: 1rem 0;
            }
            #click:checked~nav { left: 0%; transition: all 0.3s ease; }
            section { margin: 1rem 1.5rem; }
            .quiz-list { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">
            <a href="index.html">Student Portfolio</a>
        </div>

        <input type="checkbox" id="click">
        <label for="click" class="mainicon">
            <div class="menu"><i class="bi bi-list"></i></div>
        </label>

        <nav>
            <a href="index.html">Home</a>
            <a href="activities.html">Activities</a>
            <a href="quizzes.html" class="active">Quizzes</a>
            <a href="exams.html">Exams</a>
        </nav>
    </header>

    <section>
        <div class="main">
            <h1>My <span>Quizzes</span></h1>
            
            <div class="quiz-list">
                <div class="quiz-card">
                    <i class="bi bi-journal-check"></i>
                    <h3>Quiz 1</h3>
                    <br>
                    <div class="score-tag">Score: N/A</div>
                </div>

                <div class="quiz-card">
                    <i class="bi bi-palette"></i>
                    <h3>Quiz 2</h3>
                    <br>
                    <div class="score-tag">Score: N/A</div>
                </div>

                <div class="quiz-card">
                    <i class="bi bi-laptop"></i>
                    <h3>Quiz 3</h3>
                    <br>
                    <div class="score-tag">Score: N/A</div>
                </div>
            </div>
        </div>
    </section>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
    </style>
</body>

</html>

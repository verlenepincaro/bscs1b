<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <title>Exams - Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background-color: #442858;
            color: #fff;
        }

        header {
            padding: 1.7rem 1rem;
            display: flex;
            justify-content: space-between;
            max-width: 80%;
            margin: auto;
            align-items: center;
            background-color: transparent;
        }

        .logo a {
            color: #fff;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: 800;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: .97rem;
            font-weight: 600;
            padding: 0.4rem 1rem;
        }

        nav a.active,
        nav a:hover {
            color: #f4bebe;
            transition: all .3s ease-in-out;
        }

        section {
            margin: 2rem 8.5rem;
        }

        .main {
            display: flex;
            flex-direction: column;
            margin: 5rem auto;
        }

        .main h1 {
            font-size: 2.5rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 2rem;
            text-align: center;
        }

        .main h1 span {
            color: #f4bebe;
        }

        .exam-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            max-width: 900px;
            margin: 0 auto;
        }

        .exam-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(244, 190, 190, 0.1);
            padding: 3rem 2rem;
            border-radius: 20px;
            text-align: center;
            transition: all 0.4s ease;
        }

        .exam-card:hover {
            border-color: #f4bebe;
            background: rgba(244, 190, 190, 0.05);
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .exam-card i {
            font-size: 4rem;
            color: #f4bebe;
            margin-bottom: 1.5rem;
            display: block;
        }

        .exam-card h2 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        .exam-status {
            font-size: 0.9rem;
            color: #f4bebe;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }

        #click { display: none; }
        .menu { display: none; }

        @media only screen and (max-width:768px) {
            .exam-container { grid-template-columns: 1fr; }
            section { margin: 2rem 2rem; }
        }

        @media only screen and (max-width:480px) {
            .menu { display: block; font-size: 1.5rem; color: #f4bebe; }
            header { max-width: 100%; }
            nav {
                position: absolute; display: grid; top: 75px; text-align: center;
                background-color: #442858; left: -100%; z-index: 1; width: 100%; padding: 1rem 0;
            }
            #click:checked~nav { left: 0%; transition: all 0.3s ease; }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">
            <a href="index.html">Student Portfolio</a>
        </div>

        <input type="checkbox" id="click">
        <label for="click" class="mainicon">
            <div class="menu"><i class="bi bi-list"></i></div>
        </label>

        <nav>
            <a href="index.html">Home</a>
            <a href="activities.html">Activities</a>
            <a href="quizzes.html">Quizzes</a>
            <a href="exams.html" class="active">Exams</a>
        </nav>
    </header>

    <section>
        <div class="main">
            <h1>Course <span>Exams</span></h1>
            
            <div class="exam-container">
                <div class="exam-card">
                    <i class="bi bi-trophy"></i>
                    <h2>Midterm</h2>
                    <br>
                    <div class="exam-status">N/A</div>
                </div>

                <div class="exam-card">
                    <i class="bi bi-mortarboard"></i>
                    <h2>Finals</h2>
                    <br>
                    <div class="exam-status">N/A</div>
                </div>
            </div>
        </div>
    </section>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
    </style>
</body>

</html>

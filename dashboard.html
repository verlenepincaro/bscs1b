<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #442858; color: #fff; min-height: 100vh; }
        
        header { padding: 1.7rem 1rem; display: flex; justify-content: space-between; max-width: 80%; margin: auto; align-items: center; }
        .logo a { color: #fff; text-decoration: none; font-size: 1.3rem; font-weight: 800; }
        nav { display: flex; gap: 1rem; }
        nav a { color: #fff; text-decoration: none; font-size: .97rem; font-weight: 600; padding: 0.4rem 1rem; }
        nav a.active, nav a:hover { color: #f4bebe; transition: all .3s ease-in-out; }
        
        #click { display: none; }
        .menu { display: none; font-size: 1.5rem; color: #f4bebe; cursor: pointer; }

        .content { margin: 2rem 8.5rem; }
        .content h1 { font-size: 2.5rem; font-weight: 600; margin-bottom: 2rem; }
        .content h1 span { color: #f4bebe; } 

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 2rem; }
        
        .card { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 1.5rem; 
            border-radius: 15px; 
            border: 1px solid #f4bebe; 
            text-align: center; 
            transition: 0.3s; 
        }
        .card:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-10px); }
        .card i { font-size: 2rem; color: #f4bebe; margin-bottom: 1rem; display: block; }

        @media only screen and (max-width: 768px) {
            header { max-width: 100%; }
            .menu { display: block; }
            nav { position: absolute; top: 75px; left: -100%; width: 100%; background-color: #442858; display: grid; text-align: center; padding: 1rem 0; z-index: 1; }
            #click:checked ~ nav { left: 0; }
            .content { margin: 1rem 1.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><a href="index.html">Student Portfolio</a></div>
        <input type="checkbox" id="click">
        <label for="click" class="menu"><i class="bi bi-list"></i></label>
        <nav>
            <a href="index.html">Home</a>
            <a href="dashboard.html" class="active">Dashboard</a>
            <a href="activities.html">Activities</a>
            <a href="quizzes.html">Quizzes</a>
            <a href="exams.html">Exams</a>
        </nav>
    </header>

    <div class="content">
        <h1>Welcome <span>Back!</span></h1>
        <p>ITEC 50 Student Dashboard</p>

        <div class="dashboard-grid">
            <div class="card"><i class="bi bi-journal-check"></i><h2>Activities</h2><p>N/A Completed</p></div>
            <div class="card"><i class="bi bi-pencil-square"></i><h2>Quizzes</h2><p>N/A Completed</p></div>
            <div class="card"><i class="bi bi-check2-square"></i><h2>Exams</h2><p>Ongoing</p></div>
        </div>
    </div>

</body>
</html>
